<!-- ROUND TABS (hidden in visualization mode) -->
<div class="round-tabs" *ngIf="!showVisualization">
  <button *ngFor="let r of [1,2,3]" [class.active]="viewedRound === r"
    [disabled]="swapMode || (r > (currentRound + 1))" (click)="switchRound(r)">
    Round {{ r }}
  </button>
</div>

<!-- CONTROLS -->
<div class="organizer-controls">

  <!-- SHOW NORMAL OR SWAP BUTTONS ONLY IF VISUALIZATION IS OFF -->
  <ng-container *ngIf="!showVisualization">

    <!-- NORMAL MODE BUTTONS -->
    <ng-container *ngIf="!swapMode">
      <button *ngIf="canGenerateMatches" (click)="generateMatchesForViewedRound()" class="blue-btn gold-border">
        Generate Matches (Round {{viewedRound}})
      </button>
      <button (click)="toggleSwapMode()" [disabled]="isStartRoundDisabled" class="blue-btn">Swap Matches</button>
      <button (click)="finalizeMatches()" [disabled]="isStartRoundDisabled" class="blue-btn">Start Round</button>
      <button (click)="toggleVisualization()" class="blue-btn">Matching Visualization</button>
    </ng-container>

    <!-- SWAP MODE BUTTONS -->
    <ng-container *ngIf="swapMode">
      <button (click)="cancelSwap()" class="blue-btn">Back</button>
      <button (click)="swapSelectedSeats()" [disabled]="selectedMen.length !== 2 && selectedWomen.length !== 2"
        class="blue-btn">Swap</button>
      <button (click)="saveSwapChanges()" class="green-btn">Save Changes</button>
    </ng-container>

  </ng-container>

  <!-- BACK BUTTON WHEN VISUALIZATION IS ACTIVE -->
  <ng-container *ngIf="showVisualization">
    <button (click)="showVisualization = false" class="blue-btn">Back</button>
  </ng-container>

</div>

<!-- SEATING COMPONENT (only visible when NOT visualizing) -->
<app-seating *ngIf="event && !showVisualization" [maxSpots]="event.maxSpots || 0"
  [tables]="swapMode ? swapTables : roundTables[viewedRound]" [event]="event" [swapMode]="swapMode"
  [selectedMen]="selectedMen" [selectedWomen]="selectedWomen" (seatSelectedForSwap)="onSeatSelectedForSwap($event)">
</app-seating>

<!-- MATCHING VISUALIZATION COMPONENT (only visible in visualization mode) -->
<app-matching-visualization *ngIf="event && showVisualization && currentRound"
  [snapshots]="roundSnapshots[viewedRound] || []" [men]="registeredMenUsers" [women]="registeredWomenUsers">
</app-matching-visualization>
