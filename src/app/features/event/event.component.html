<div class="event-card">

  <!-- Event image placeholder -->
  <div class="event-image">
    <img src="event-placeholder.svg" alt="Event image">
  </div>

  <div class="event-content">

    <!-- Title -->
    <h2 class="event-title">{{ event.title }}</h2>

    <!-- Date and location -->
    <div class="event-meta">
      <span class="event-date">{{ event.date | date:'mediumDate' }}</span>
      <span class="event-location">{{ event.location }}</span>
    </div>

    <!-- Description -->
    <p class="event-description">{{ event.description }}</p>

    <!-- Available spots with icons -->
    <div class="event-availability">
      <span class="availability">
        <img src="/women_icon.svg" class="gender-icon" alt="Women">
        {{ registeredWomenCount }}/{{ maxPerGender }}
      </span>

      <span class="availability">
        <img src="/men_icon.svg" class="gender-icon" alt="Men">
        {{ registeredMenCount }}/{{ maxPerGender }}
      </span>
    </div>

    <div class="event-countdown" *ngIf="countdown">
      {{ countdown }}
    </div>

    <div class="event-actions" *ngIf="!isAdmin">
      <!-- Show Register/Unregister only if event hasn't started -->
      <ng-container *ngIf="!eventStarted">
        <button *ngIf="!isRegistered" (click)="onRegister()" [disabled]="isRegisterDisabled">
          {{ isRegisterDisabled ? 'Full' : 'Register' }}
        </button>
        <button *ngIf="isRegistered" (click)="onUnregister()">Unregister</button>
      </ng-container>

      <!-- Show Check in button if event has started -->
      <button *ngIf="eventStarted && !isAdmin" class="minty" (click)="onCheckIn()">
        Check in
      </button>
    </div>

    <div class="event-actions" *ngIf="isAdmin">
      <!-- Manage button: visible 15 min before to 75 min after event starts -->
      <button *ngIf="showManageButton" class="minty" (click)="onManage()">Manage</button>

      <!-- Edit button -->
      <button (click)="onEdit()">Edit</button>
    </div>

  </div>
</div>
